name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - '30.1'
          - snapshot
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@v7.0
        with:
          version: ${{ matrix.emacs-version }}
      - name: Byte-compile
        run: make compile
      - name: Run tests
        run: make test
